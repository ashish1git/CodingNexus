services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codingnexus-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

    env_file:
      - .env.docker

    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3000}

      # JWT Configuration
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}

      # CORS Configuration
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5000}

      # Cloudinary Configuration
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - VITE_CLOUDINARY_CLOUD_NAME=${VITE_CLOUDINARY_CLOUD_NAME}
      - VITE_CLOUDINARY_UPLOAD_PRESET=${VITE_CLOUDINARY_UPLOAD_PRESET}
      - VITE_CLOUDINARY_NOTES_PRESET=${VITE_CLOUDINARY_NOTES_PRESET}

      # Judge0 Configuration
      - JUDGE0_URL=${JUDGE0_URL:-http://64.227.149.20:2358}
      - VITE_JUDGE0_URL=${VITE_JUDGE0_URL:-http://64.227.149.20:2358}

      # Brevo Email Configuration
      - BREVO_API_KEY=${BREVO_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME}
      - EMAIL_SERVICE=${EMAIL_SERVICE:-brevo}

      # Async Submissions
      - ENABLE_POLLING=${ENABLE_POLLING:-false}
      - POLL_INTERVAL=${POLL_INTERVAL:-15000}

      # Maintenance Mode
      - MAINTENANCE_MODE=${MAINTENANCE_MODE:-false}
      - VITE_MAINTENANCE_MODE=${VITE_MAINTENANCE_MODE:-false}

      # AI APIs
      - USE_GEMINI_DIRECT=${USE_GEMINI_DIRECT:-false}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-}

      # Frontend API URL
      - VITE_API_URL=${VITE_API_URL:-http://localhost:3000/api}


    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: codingnexus-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dist:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    profiles:
      - with-nginx

volumes:
  postgres_data:
     driver: local

networks:
  default:
    name: codingnexus-network
