services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?Error: VITE_API_BASE_URL is required}
    container_name: codingnexus-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    
    # Allow container to access host's localhost services (PostgreSQL on server)
    # Using host.docker.internal works on Linux, Mac, Windows Docker Desktop
    # For Linux servers, set DATABASE_URL to use server IP instead
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "localhost:host-gateway"

    env_file:
      - .env.docker

    environment:
      - NODE_ENV=${NODE_ENV:?Error: NODE_ENV is required}
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:?Error: DATABASE_URL is required}
      - JWT_SECRET=${JWT_SECRET:?Error: JWT_SECRET is required}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - FRONTEND_URL=${FRONTEND_URL:?Error: FRONTEND_URL is required}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - VITE_CLOUDINARY_CLOUD_NAME=${VITE_CLOUDINARY_CLOUD_NAME}
      - VITE_CLOUDINARY_UPLOAD_PRESET=${VITE_CLOUDINARY_UPLOAD_PRESET}
      - VITE_CLOUDINARY_NOTES_PRESET=${VITE_CLOUDINARY_NOTES_PRESET}
      - JUDGE0_URL=${JUDGE0_URL:?Error: JUDGE0_URL is required}
      - VITE_JUDGE0_URL=${VITE_JUDGE0_URL:?Error: VITE_JUDGE0_URL is required}
      - BREVO_API_KEY=${BREVO_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM:?Error: EMAIL_FROM is required}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-Coding Nexus}
      - EMAIL_SERVICE=${EMAIL_SERVICE:-brevo}
      - ENABLE_POLLING=${ENABLE_POLLING:-false}
      - POLL_INTERVAL=${POLL_INTERVAL:-15000}
      - MAINTENANCE_MODE=${MAINTENANCE_MODE:-false}
      - VITE_MAINTENANCE_MODE=${VITE_MAINTENANCE_MODE:-false}
      - USE_GEMINI_DIRECT=${USE_GEMINI_DIRECT:-false}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL}
      - VITE_API_URL=${VITE_API_URL:?Error: VITE_API_URL is required}

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    networks:
      - codingnexus-network

  nginx:
    image: nginx:alpine
    container_name: codingnexus-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dist:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - codingnexus-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local

networks:
  codingnexus-network:
    driver: bridge
